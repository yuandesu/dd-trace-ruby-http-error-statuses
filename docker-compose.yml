services:
  datadog-agent:
    image: datadog/agent:7
    environment:
      DD_API_KEY: ${DD_API_KEY}
      DD_SITE: datadoghq.com
      DD_APM_ENABLED: "true"
      DD_APM_NON_LOCAL_TRAFFIC: "true"
      DD_LOG_LEVEL: WARN
      DD_HOSTNAME: dd-agent-local
    ports:
      - "8127:8126"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8126/info"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  # before: DD_TRACE_HTTP_SERVER_ERROR_STATUSES 未設定（デフォルト）
  # 403/422 → span.status=0 → APM にエラーとして表示されない
  app-before:
    build: .
    environment:
      DD_SERVICE: http-status-before
      DD_ENV: local
      DD_AGENT_HOST: datadog-agent
      DD_TRACE_AGENT_PORT: "8126"
    ports:
      - "4001:3000"
    depends_on:
      datadog-agent:
        condition: service_healthy

  # after: DD_TRACE_HTTP_SERVER_ERROR_STATUSES を設定
  # 403/422 → span.status=1 → APM にエラーとして表示される
  app-after:
    build: .
    environment:
      DD_SERVICE: http-status-after
      DD_ENV: local
      DD_AGENT_HOST: datadog-agent
      DD_TRACE_AGENT_PORT: "8126"
      # デフォルト (500-599) に加えて 403, 422 もエラーとして扱う
      DD_TRACE_HTTP_SERVER_ERROR_STATUSES: "403,422,500-599"
    ports:
      - "4002:3000"
    depends_on:
      datadog-agent:
        condition: service_healthy
